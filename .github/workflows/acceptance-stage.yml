name: acceptance-stage

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:

concurrency:
  group: acceptance-stage

jobs:

  check:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.should-run.outputs.should-run }}
      image-digest-urls: ${{ steps.find-latest.outputs.image-digest-urls }}

    permissions:
      contents: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Find Latest Artifacts
      id: find-latest
      uses: optivem/actions/find-latest-docker-images@v1
      with:
        image-urls: |
          ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/monolith:latest

    - name: Check Run Conditions
      id: should-run
      uses: optivem/actions/should-run-acceptance-stage@v1
      with:
        latest-image-timestamp: ${{ steps.find-latest.outputs.latest-image-timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.promote-to-rc.outputs.version }}
      image-urls: ${{ steps.promote-to-rc.outputs.image-urls }}

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Deploy Artifacts
      id: deploy-system
      uses: optivem/actions/simulate-deployment@v1
      with:
        environment: acceptance
        version: latest
        image-urls: ${{ needs.check.outputs.image-digest-urls }}
        system-url: 'http://localhost:8080/'
        working-directory: system-test

    - name: Setup .NET
      uses: optivem/actions/setup-dotnet@v1
      with:
        dotnet-version: 8.0.x

    - name: Build Test Project
      run: dotnet build
      working-directory: system-test

    - name: Install Playwright Browsers
      run: |
        pwsh bin/Debug/net8.0/playwright.ps1 install
      working-directory: system-test

    - name: Run Smoke Tests
      run: dotnet test --filter "FullyQualifiedName~SmokeTests" --verbosity normal
      working-directory: system-test

    - name: Run Acceptance Tests
      run: echo "Run Acceptance Tests"

    - name: Run External System Contract Tests
      run: echo "Run External System Contract Tests"

    - name: Run E2E Tests
      run: dotnet test --filter "FullyQualifiedName~E2eTests" --verbosity normal
      working-directory: system-test

    - name: Promote to RC
      id: promote-to-rc
      uses: optivem/actions/promote-to-rc@v1
      with:
        image-urls: ${{ needs.check.outputs.image-digest-urls }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Summarize Acceptance Stage
      uses: optivem/actions/summarize-system-stage@v1
      with:
        stage-name: 'Acceptance Stage'
        environment: acceptance
        stage-result: ${{ needs.run.result }}
        success-version: ${{ needs.run.outputs.version }}
        success-artifact-ids: ${{ needs.run.outputs.image-urls }}
